<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0D0F;
  --s1:     #0F1215;
  --s2:     #141820;
  --s3:     #1A1F26;
  --bdr:    #222830;
  --bdr2:   #2C333D;
  --amber:  #E09B2F;
  --a10:    rgba(224,155,47,0.10);
  --a20:    rgba(224,155,47,0.20);
  --txt:    #E8E5DE;
  --t2:     #858E99;
  --t3:     #434C57;
  --grn:    #3F9460;
  --red:    #B84040;
  --blu:    #4D7FA8;
  --f:      'IBM Plex Sans', sans-serif;
  --fm:     'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); scroll-behavior: smooth; }
body { background: var(--bg); color: var(--txt); font-family: var(--f); font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; }
button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

/* ── Layout ── */
.w { max-width: 1300px; margin: 0 auto; padding: 0 36px 96px; }

/* ── Header ── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0 18px; border-bottom: 1px solid var(--bdr);
}
.logo {
  font-family: var(--f); font-weight: 700; font-size: 17px;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--txt);
}
.logo em { color: var(--amber); font-style: normal; }
.logo span { font-weight: 300; font-size: 11px; letter-spacing: 0.14em; color: var(--t3); margin-left: 12px; }

.sess-strip { display: flex; align-items: center; gap: 28px; font-family: var(--fm); font-size: 11px; color: var(--t2); }
.clk { color: var(--txt); letter-spacing: 0.04em; }
.sess-list { display: flex; gap: 20px; list-style: none; }
.sess { display: flex; align-items: center; gap: 6px; letter-spacing: 0.09em; text-transform: uppercase; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); transition: background .3s, box-shadow .3s; }
.sess.on .dot { background: var(--amber); box-shadow: 0 0 0 3px rgba(224,155,47,0.15); animation: bp 2.4s ease-in-out infinite; }
.sess.on { color: var(--txt); }
@keyframes bp { 0%,100% { box-shadow: 0 0 0 3px rgba(224,155,47,0.15); } 50% { box-shadow: 0 0 0 6px rgba(224,155,47,0.04); } }

/* ── Section ── */
.sec { margin-top: 56px; }
.sec-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--bdr);
}
.sec-ttl { font-family: var(--fm); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--t3); }
.sec-meta { font-family: var(--fm); font-size: 10px; color: var(--t3); }

/* ── Tabs (shared) ── */
.tabs { display: flex; gap: 2px; }
.tab {
  font-family: var(--fm); font-size: 11px; letter-spacing: 0.05em;
  color: var(--t2); background: transparent; border: 1px solid transparent;
  padding: 5px 11px; border-radius: 2px; transition: all .14s;
}
.tab:hover { color: var(--txt); }
.tab.on { color: var(--bg); background: var(--amber); border-color: var(--amber); }

/* ── Calendar ── */
.cal-box {
  border: 1px solid var(--bdr); border-radius: 2px; overflow: hidden;
  height: 740px; background: var(--s1);
}

/* ── News ── */
.news-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--bdr); border: 1px solid var(--bdr); border-radius: 2px;
}
.news-ph {
  grid-column: 1/-1; padding: 44px; text-align: center;
  color: var(--t3); font-family: var(--fm); font-size: 12px; background: var(--s1);
}
.ncard {
  background: var(--s1); padding: 22px 24px; display: flex; flex-direction: column;
  gap: 9px; transition: background .14s;
}
.ncard:hover { background: var(--s2); }
.ncard-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.nsrc { font-family: var(--fm); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); }
.ntime { font-family: var(--fm); font-size: 10px; color: var(--t3); white-space: nowrap; }
.ntitle { font-size: 13.5px; font-weight: 500; line-height: 1.42; color: var(--txt); }
.ndesc {
  font-size: 12px; color: var(--t2); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ── Strength ── */
.str-wrap { border: 1px solid var(--bdr); border-radius: 2px; overflow: hidden; }
.str-hdr {
  display: grid; grid-template-columns: 28px 52px 1fr 120px 44px 72px;
  gap: 14px; padding: 10px 20px; background: var(--s2);
  border-bottom: 1px solid var(--bdr);
  font-family: var(--fm); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3);
}
.str-row {
  display: grid; grid-template-columns: 28px 52px 1fr 120px 44px 72px;
  align-items: center; gap: 14px; padding: 13px 20px;
  background: var(--s1); border-bottom: 1px solid var(--bdr); transition: background .14s;
}
.str-row:last-child { border-bottom: none; }
.str-row:hover { background: var(--s2); }
.s-rank { font-family: var(--fm); font-size: 11px; color: var(--t3); }
.s-code { font-family: var(--fm); font-size: 17px; font-weight: 500; }
.s-spark { width: 100%; height: 34px; display: block; }
.s-bar-w { position: relative; height: 3px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.s-bar-f { height: 100%; border-radius: 2px; background: var(--amber); transition: width .5s ease; }
.s-bar-f.w { background: var(--t3); }
.s-val { font-family: var(--fm); font-size: 12px; color: var(--t2); text-align: right; }
.s-tier { font-family: var(--fm); font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; text-align: center; padding: 2px 8px; border-radius: 2px; }
.s-tier.s { color: var(--amber); background: var(--a10); }
.s-tier.n { color: var(--blu); background: rgba(77,127,168,0.10); }
.s-tier.w { color: var(--t3); background: rgba(67,76,87,0.15); }

/* ── Compare ── */
.cmp-box { margin-top: 16px; padding: 20px 24px; background: var(--s1); border: 1px solid var(--bdr); border-radius: 2px; }
.cmp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.csel {
  flex: 1; background: var(--s2); border: 1px solid var(--bdr); color: var(--txt);
  font-family: var(--fm); font-size: 12px; padding: 7px 10px; border-radius: 2px;
}
.cmp-vs { font-family: var(--fm); font-size: 11px; color: var(--t3); }
.cmp-bar { display: flex; height: 5px; background: var(--s3); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
.cmp-h { width: 50%; display: flex; }
.cmp-h.l { justify-content: flex-end; }
.cmp-f { height: 100%; }
.cmp-f.a { background: var(--amber); }
.cmp-f.b { background: var(--blu); }
.cmp-mid { width: 1px; background: var(--bdr2); flex-shrink: 0; }
.cmp-txt { text-align: center; font-size: 12.5px; color: var(--t2); }
.cmp-txt strong { color: var(--txt); font-weight: 500; }
.cmp-diff { font-family: var(--fm); font-size: 11px; color: var(--t3); margin-left: 5px; }

/* ── Correlation ── */
.corr-ctrl { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 16px; }
.corr-lbl { font-family: var(--fm); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-right: 2px; }
.ctog {
  font-family: var(--fm); font-size: 11px; padding: 4px 10px;
  border: 1px solid var(--bdr); border-radius: 2px; background: transparent; color: var(--t3); transition: all .14s;
}
.ctog.on { color: var(--txt); border-color: var(--bdr2); background: var(--s2); }
.corr-sc { overflow-x: auto; border: 1px solid var(--bdr); border-radius: 2px; }
.ctable { border-collapse: collapse; font-family: var(--fm); font-size: 12px; width: 100%; }
.ctable th, .ctable td { padding: 10px 13px; text-align: center; border: 1px solid var(--bdr); }
.ctable thead th { background: var(--s2); color: var(--t2); font-size: 10.5px; letter-spacing: 0.06em; }
.ctable tbody th { background: var(--s2); color: var(--t2); text-align: left; padding-left: 16px; font-size: 10.5px; white-space: nowrap; }
.cself { color: var(--t3) !important; background: var(--s3) !important; }

/* ── Journal ── */
.jrn-wrap { display: grid; grid-template-columns: 340px 1fr; gap: 1px; background: var(--bdr); border: 1px solid var(--bdr); border-radius: 2px; overflow: hidden; }
.jrn-form { background: var(--s1); padding: 22px; display: flex; flex-direction: column; gap: 12px; }
.jrn-meta { display: flex; justify-content: space-between; align-items: center; }
.jrn-date { font-family: var(--fm); font-size: 11px; color: var(--t2); }
.bsel { background: var(--s2); border: 1px solid var(--bdr); color: var(--txt); font-family: var(--fm); font-size: 11px; padding: 5px 8px; border-radius: 2px; }
.jrn-ta { background: var(--s2); border: 1px solid var(--bdr); color: var(--txt); font-family: var(--f); font-size: 13px; padding: 11px; border-radius: 2px; min-height: 96px; resize: vertical; line-height: 1.5; }
.jrn-ta::placeholder { color: var(--t3); }
.jrn-ta:focus { outline: none; border-color: var(--bdr2); }
.jrn-btn { align-self: flex-start; background: var(--amber); color: var(--bg); border: none; font-family: var(--fm); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 18px; border-radius: 2px; transition: opacity .14s; }
.jrn-btn:hover { opacity: .88; }
.jrn-list { background: var(--s1); list-style: none; overflow-y: auto; max-height: 360px; }
.jrn-empty { padding: 36px; text-align: center; color: var(--t3); font-size: 12px; }
.jentry { padding: 16px 20px; border-bottom: 1px solid var(--bdr); }
.jentry:last-child { border-bottom: none; }
.jentry-hd { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; font-family: var(--fm); font-size: 10.5px; color: var(--t3); }
.bias { padding: 2px 7px; border-radius: 2px; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
.bias.bullish { color: var(--grn); border: 1px solid var(--grn); }
.bias.bearish { color: var(--red); border: 1px solid var(--red); }
.bias.neutral { color: var(--t2); border: 1px solid var(--t3); }
.jentry-txt { font-size: 13px; color: var(--txt); line-height: 1.5; }

/* ── Footer ── */
.foot { margin-top: 64px; padding-top: 16px; border-top: 1px solid var(--bdr); display: flex; justify-content: space-between; font-family: var(--fm); font-size: 10px; color: var(--t3); flex-wrap: wrap; gap: 8px; }

/* ── Responsive ── */
@media (max-width: 960px) {
  .sess-strip { display: none; }
  .news-grid { grid-template-columns: 1fr 1fr; }
  .str-hdr { display: none; }
  .str-row { grid-template-columns: 28px 48px 1fr 44px 60px; }
  .str-row > :nth-child(4) { display: none; }
  .jrn-wrap { grid-template-columns: 1fr; }
}
@media (max-width: 620px) {
  .w { padding: 0 18px 60px; }
  .news-grid { grid-template-columns: 1fr; }
  .str-row { grid-template-columns: 28px 44px 1fr 40px; }
  .str-row > :nth-child(5), .str-row > :nth-child(6) { display: none; }
}
</style>
</head>
<body>
<div class="w">

  <!-- Header -->
  <header class="hd">
    <div class="logo">MERID<em>I</em>AN<span>Trading Desk</span></div>
    <div class="sess-strip">
      <span class="clk" id="clk">--:--:-- UTC</span>
      <ul class="sess-list">
        <li class="sess" data-s="0" data-e="9"><span class="dot"></span>Asia</li>
        <li class="sess" data-s="8" data-e="17"><span class="dot"></span>London</li>
        <li class="sess" data-s="13" data-e="22"><span class="dot"></span>New York</li>
      </ul>
    </div>
  </header>

  <!-- Calendar -->
  <section class="sec">
    <div class="sec-hd">
      <span class="sec-ttl">Ekonomický kalendář</span>
      <span class="sec-meta">TradingView · živá data</span>
    </div>
    <div class="cal-box">
      <div class="tradingview-widget-container" id="calWgt" style="height:100%">
        <div class="tradingview-widget-container__widget"></div>
      </div>
    </div>
  </section>

  <!-- News -->
  <section class="sec">
    <div class="sec-hd">
      <span class="sec-ttl">Novinky</span>
      <div class="tabs" id="newsTabs">
        <button class="tab on" data-feed="forex">Forex</button>
        <button class="tab" data-feed="macro">Ekonomika</button>
        <button class="tab" data-feed="markets">Trhy</button>
      </div>
    </div>
    <div class="news-grid" id="newsGrid">
      <div class="news-ph">Načítám zprávy…</div>
    </div>
  </section>

  <!-- Currency -->
  <section class="sec">
    <div class="sec-hd">
      <span class="sec-ttl" id="ccyMeta">Vztahy mezi měnami</span>
      <div class="tabs">
        <button class="tab on" id="tStr">Síla měn</button>
        <button class="tab" id="tCorr">Korelace</button>
      </div>
    </div>

    <!-- Strength panel -->
    <div id="panStr">
      <div class="str-wrap" id="strBoard">
        <div class="news-ph">Načítám ECB kurzy…</div>
      </div>
      <div class="cmp-box">
        <div class="cmp-row">
          <select id="baseC" class="csel"></select>
          <span class="cmp-vs">vs</span>
          <select id="quoteC" class="csel"></select>
        </div>
        <div id="cmpOut"></div>
      </div>
    </div>

    <!-- Correlation panel -->
    <div id="panCorr" style="display:none">
      <div class="corr-ctrl">
        <span class="corr-lbl">Měny:</span>
        <div id="corrToggles" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div class="corr-sc" id="corrOut"></div>
    </div>
  </section>

  <!-- Journal -->
  <section class="sec">
    <div class="sec-hd">
      <span class="sec-ttl">Deník</span>
      <span class="sec-meta">session záznamy · lokálně</span>
    </div>
    <div class="jrn-wrap">
      <div class="jrn-form">
        <div class="jrn-meta">
          <span class="jrn-date" id="jrnDate">—</span>
          <select class="bsel" id="jrnBias">
            <option value="bullish">Bullish</option>
            <option value="neutral">Neutrální</option>
            <option value="bearish">Bearish</option>
          </select>
        </div>
        <textarea class="jrn-ta" id="jrnTa" placeholder="Bias, co fungovalo, plán na zítra…"></textarea>
        <button class="jrn-btn" id="jrnAdd">Přidat záznam</button>
      </div>
      <ul class="jrn-list" id="jrnList">
        <li class="jrn-empty">Zatím žádné záznamy v této relaci.</li>
      </ul>
    </div>
  </section>

  <footer class="foot">
    <span>Meridian · soukromý trading dashboard</span>
    <span id="footDate">—</span>
  </footer>
</div>

<script>
// ── Clock + sessions ──
const clkEl=document.getElementById('clk'),footEl=document.getElementById('footDate');
const sesEls=document.querySelectorAll('.sess');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const n=new Date(),h=n.getUTCHours(),m=n.getUTCMinutes(),s=n.getUTCSeconds();
  clkEl.textContent=`${pad(h)}:${pad(m)}:${pad(s)} UTC`;
  sesEls.forEach(e=>e.classList.toggle('on',h>=+e.dataset.s&&h<+e.dataset.e));
  footEl.textContent=n.toLocaleDateString('cs-CZ',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
tick();setInterval(tick,1000);

// ── TradingView calendar ──
(function(){
  const el=document.getElementById('calWgt');
  el.innerHTML='<div class="tradingview-widget-container__widget"></div>';
  const s=document.createElement('script');
  s.src='https://s3.tradingview.com/external-embedding/embed-widget-events.js';
  s.async=true;
  s.innerHTML=JSON.stringify({
    colorTheme:'dark',isTransparent:true,width:'100%',height:'100%',locale:'cs',
    importanceFilter:'-1,0,1',countryFilter:'us,eu,gb,jp,ca,au,nz,ch'
  });
  el.appendChild(s);
})();

// ── News via RSS2JSON ──
const FEEDS={
  forex: {url:'https://www.forexlive.com/rss/news', label:'ForexLive'},
  macro: {url:'https://feeds.reuters.com/reuters/businessNews', label:'Reuters'},
  markets:{url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664', label:'CNBC'}
};

function relTime(ds){
  const d=Date.now()-new Date(ds).getTime(),min=Math.floor(d/6e4),hr=Math.floor(d/36e5),day=Math.floor(d/864e5);
  if(min<2)return'právě teď';if(min<60)return`před ${min} min`;if(hr<24)return`před ${hr} hod`;return`před ${day} d`;
}
function strip(s){return s?s.replace(/<[^>]+>/g,'').replace(/&[a-z#0-9]+;/gi,' ').trim():'';}

async function loadNews(key){
  const grid=document.getElementById('newsGrid');
  grid.innerHTML='<div class="news-ph">Načítám zprávy…</div>';
  const feed=FEEDS[key];
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=6`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.status!=='ok'||!d.items?.length)throw new Error(d.message||'Žádné výsledky');
    grid.innerHTML=d.items.slice(0,6).map(it=>`
      <a href="${it.link}" target="_blank" rel="noopener" class="ncard">
        <div class="ncard-top">
          <span class="nsrc">${feed.label}</span>
          <span class="ntime">${relTime(it.pubDate)}</span>
        </div>
        <div class="ntitle">${it.title}</div>
        <div class="ndesc">${strip(it.description||it.content||'')}</div>
      </a>`).join('');
  }catch(e){
    grid.innerHTML=`<div class="news-ph">Zprávy se nepodařilo načíst: ${e.message}</div>`;
  }
}

document.querySelectorAll('#newsTabs .tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('#newsTabs .tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');loadNews(t.dataset.feed);
  });
});
loadNews('forex');

// ── Currency strength + correlation ──
const CCY=['USD','GBP','JPY','CHF','CAD','AUD','NZD'],ALL=['EUR',...CCY];
let fx=null,corrOn=new Set(ALL);

function spark(pts,w=90,h=34){
  if(!pts||pts.length<2)return'';
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1e-9;
  const step=w/(pts.length-1);
  return pts.map((v,i)=>`${(i*step).toFixed(1)},${(h-((v-mn)/rng*26+4)).toFixed(1)}`).join(' ');
}
function pearson(a,b){
  const n=a.length,ma=a.reduce((s,v)=>s+v,0)/n,mb=b.reduce((s,v)=>s+v,0)/n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){num+=(a[i]-ma)*(b[i]-mb);da+=(a[i]-ma)**2;db+=(b[i]-mb)**2;}
  return da>0&&db>0?num/Math.sqrt(da*db):0;
}

async function loadFx(){
  const end=new Date(),start=new Date(end.getTime()-50*864e5);
  const fmt=d=>d.toISOString().slice(0,10);
  const r=await fetch(`https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(end)}?base=EUR&symbols=${CCY.join(',')}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const data=await r.json();
  const dates=Object.keys(data.rates).sort();
  if(dates.length<5)throw new Error('Málo dat');
  const rs={};CCY.forEach(c=>{rs[c]=dates.map(d=>Math.log(data.rates[d][c]));});rs.EUR=dates.map(()=>0);
  const dr={};ALL.forEach(c=>{dr[c]=[];for(let i=1;i<dates.length;i++)dr[c].push(rs[c][i]-rs[c][i-1]);});
  const n=dates.length-1,ss={};
  ALL.forEach(C=>{ss[C]=[];for(let t=0;t<n;t++){let s=0;ALL.forEach(D=>{if(D!==C)s+=dr[D][t];});ss[C].push(s/(ALL.length-1)-dr[C][t]);}});
  const wn=Math.min(10,n),avg={};
  ALL.forEach(C=>{const sl=ss[C].slice(-wn);avg[C]=sl.reduce((a,b)=>a+b,0)/sl.length;});
  const vs=Object.values(avg),mn=Math.min(...vs),mx=Math.max(...vs),sc={};
  ALL.forEach(C=>{sc[C]=mx>mn?Math.round(((avg[C]-mn)/(mx-mn))*100):50;});
  const spk={};ALL.forEach(C=>{spk[C]=ss[C].slice(-14);});
  const co={};ALL.forEach(C=>{co[C]={};ALL.forEach(D=>{co[C][D]=C===D?1:pearson(dr[C],dr[D]);});});
  return{scaled:sc,sparkSeries:spk,corr:co,asOf:dates[dates.length-1]};
}

const T={s:'Silná',n:'Neutrální',w:'Slabá'};
function tier(v){return v>=65?'s':v>=35?'n':'w';}
function scColor(v){return v>=65?'#E09B2F':v>=35?'#4D7FA8':'#434C57';}

function renderStr(){
  if(!fx)return;
  const sorted=ALL.slice().sort((a,b)=>fx.scaled[b]-fx.scaled[a]);
  let h=`<div class="str-hdr"><span>#</span><span>Měna</span><span>Trend 14d</span><span>Bar</span><span>Síla</span><span>Tier</span></div>`;
  sorted.forEach((c,i)=>{
    const v=fx.scaled[c],t=tier(v),col=scColor(v);
    h+=`<div class="str-row">
      <span class="s-rank">${String(i+1).padStart(2,'0')}</span>
      <span class="s-code" style="color:${col}">${c}</span>
      <svg class="s-spark" viewBox="0 0 90 34" preserveAspectRatio="none">
        <polyline points="${spark(fx.sparkSeries[c])}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <div class="s-bar-w"><div class="s-bar-f${t==='w'?' w':''}" style="width:${v}%"></div></div>
      <span class="s-val">${v}</span>
      <span class="s-tier ${t}">${T[t]}</span>
    </div>`;
  });
  document.getElementById('strBoard').innerHTML=h;
  document.getElementById('ccyMeta').textContent=`Vztahy mezi měnami · ECB k ${fx.asOf}`;
}

function corrCol(v){return v>=0?`rgba(224,155,47,${.06+v*.50})`:`rgba(184,64,64,${.06+Math.abs(v)*.50})`;}

function renderCorr(){
  if(!fx)return;
  const act=ALL.filter(c=>corrOn.has(c));
  if(act.length<2){document.getElementById('corrOut').innerHTML='<div class="news-ph">Vyber alespoň 2 měny.</div>';return;}
  let h='<table class="ctable"><thead><tr><th></th>';
  act.forEach(c=>h+=`<th>${c}</th>`);h+='</tr></thead><tbody>';
  act.forEach(r=>{
    h+=`<tr><th>${r}</th>`;
    act.forEach(c=>{
      const v=fx.corr[r][c];
      h+=r===c?'<td class="cself">—</td>':`<td style="background:${corrCol(v)};color:var(--txt)">${v.toFixed(2)}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('corrOut').innerHTML=h;
}

function buildToggles(){
  const w=document.getElementById('corrToggles');
  w.innerHTML=ALL.map(c=>`<button class="ctog on" data-c="${c}">${c}</button>`).join('');
  w.querySelectorAll('.ctog').forEach(btn=>btn.addEventListener('click',()=>{
    const c=btn.dataset.c;
    if(corrOn.has(c)){if(corrOn.size<=2)return;corrOn.delete(c);btn.classList.remove('on');}
    else{corrOn.add(c);btn.classList.add('on');}
    renderCorr();
  }));
}

function renderCmp(){
  if(!fx)return;
  const b=document.getElementById('baseC').value,q=document.getElementById('quoteC').value,out=document.getElementById('cmpOut');
  if(b===q){out.innerHTML='<div style="text-align:center;color:var(--t3);font-size:12px;padding:6px 0">Vyber dvě různé měny.</div>';return;}
  const diff=fx.scaled[b]-fx.scaled[q],pct=Math.min(Math.abs(diff)/2,50),bs=diff>=0;
  out.innerHTML=`<div class="cmp-bar">
    <div class="cmp-h l">${!bs?`<div class="cmp-f b" style="width:${pct}%"></div>`:''}</div>
    <div class="cmp-mid"></div>
    <div class="cmp-h">${bs?`<div class="cmp-f a" style="width:${pct}%"></div>`:''}</div>
  </div>
  <div class="cmp-txt"><strong>${bs?b:q}</strong> je silnější než <strong>${bs?q:b}</strong><span class="cmp-diff">(${Math.abs(diff)} b.)</span></div>`;
}

// tab toggle
document.getElementById('tStr').addEventListener('click',()=>{
  document.getElementById('tStr').classList.add('on');document.getElementById('tCorr').classList.remove('on');
  document.getElementById('panStr').style.display='';document.getElementById('panCorr').style.display='none';
});
document.getElementById('tCorr').addEventListener('click',()=>{
  document.getElementById('tCorr').classList.add('on');document.getElementById('tStr').classList.remove('on');
  document.getElementById('panStr').style.display='none';document.getElementById('panCorr').style.display='';
});

loadFx().then(model=>{
  fx=model;
  const sorted=ALL.slice().sort((a,b)=>fx.scaled[b]-fx.scaled[a]);
  const bs=document.getElementById('baseC'),qs=document.getElementById('quoteC');
  sorted.forEach(c=>{bs.innerHTML+=`<option value="${c}">${c}</option>`;qs.innerHTML+=`<option value="${c}">${c}</option>`;});
  bs.value='USD';qs.value='EUR';
  bs.addEventListener('change',renderCmp);qs.addEventListener('change',renderCmp);
  renderStr();buildToggles();renderCorr();renderCmp();
}).catch(e=>{document.getElementById('strBoard').innerHTML=`<div class="news-ph">Chyba: ${e.message}</div>`;});

// ── Journal ──
const jrn=[],jList=document.getElementById('jrnList');
document.getElementById('jrnDate').textContent=new Date().toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'});
function renderJ(){
  jList.innerHTML=jrn.length?jrn.map(e=>`
    <li class="jentry">
      <div class="jentry-hd"><span>${e.time}</span><span class="bias ${e.bias}">${e.bias}</span></div>
      <div class="jentry-txt">${e.text}</div>
    </li>`).join(''):'<li class="jrn-empty">Zatím žádné záznamy v této relaci.</li>';
}
document.getElementById('jrnAdd').addEventListener('click',()=>{
  const el=document.getElementById('jrnTa'),txt=el.value.trim();if(!txt)return;
  const bias=document.getElementById('jrnBias').value;
  const time=new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  jrn.unshift({text:txt.replace(/</g,'&lt;'),bias,time});el.value='';renderJ();
});
</script>
